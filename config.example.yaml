# Chimera 配置示例文件
# 复制此文件为 config.yaml 并填入您的实际配置

server:
  host: ""  # 监听地址，留空表示监听所有地址
  port: 8080  # 监听端口
  # enable-auth: false  # 可选：显式关闭认证；未配置时沿用旧行为（有 api-keys 就启用）
  api-keys:  # 服务器 API 密钥列表
    - "your-api-key-here"
  # tool-diagnostics-log: "/tmp/chimera-tools.jsonl"  # 可选：工具诊断日志文件，默认关闭

codex:
  callback-base-url: "http://127.0.0.1:8080"  # 可选：Codex OAuth 回调基础地址

providers:
  - name: "example-provider"  # 提供商名称
    type: "openai-compatible"  # 提供商类型
    base-url: "https://api.example.com/v1"  # API 基础 URL
    api-key: "your-provider-api-key"  # 提供商 API 密钥
    models:
      - name: "model-name"  # 模型名称
        alias: "model-alias"  # 模型别名
      - name: "another-model-name"
        alias: ["model-alias-a", "model-alias-b"]  # 多个模型别名

  - name: "codex-oauth"
    type: "codex"
    base-url: "https://chatgpt.com/backend-api/codex"
    auth-dir: "/tmp/chimera-codex-auth"
    models:
      - name: "gpt-5-codex"
        alias: ["claude-sonnet-4", "claude-opus-4.1"]
